# Render Blueprint — shared staging for other devs (not hard production).
# After deploy: add your onrender.com URL to Supabase Auth → URL Configuration.
#
# AI: set PERPLEXITY_COOKIES in the dashboard (paste from data/perplexity-cookies.txt).
# Do NOT commit cookies.

services:
  - type: web
    name: trustlens-ai
    runtime: node
    plan: free
    # Free web services are most reliable in oregon; change later if you prefer.
    region: oregon
    # Build tools live in dependencies so production npm install still has vite/nitro.
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22.13.1"
      - key: VITE_DB_PROVIDER
        value: supabase
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PERPLEXITY_PREFER_COOKIES
        value: "1"
      - key: PERPLEXITY_COOKIES
        sync: false
      # Optional: official Perplexity for text + vision
      - key: PERPLEXITY_API_KEY
        sync: false
      # Mobile screenshot vision (Claude / freemodel Anthropic-compatible)
      # Set ANTHROPIC_API_KEY in the dashboard (do not commit secrets).
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      # freemodel.dev proxy — Perplexity-free vision for screenshots
      - key: ANTHROPIC_BASE_URL
        value: "https://cc.freemodel.dev"
      - key: CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC
        value: "1"
      # freemodel catalog id (models.dev/providers/freemodel). Server retries
      # opus-4-7 → 4-6 → sonnet-4-6 → haiku if the preferred id 404s.
      - key: CLAUDE_VISION_MODEL
        value: "claude-opus-4-8"
      - key: ANTHROPIC_MODEL
        value: "claude-opus-4-8"
