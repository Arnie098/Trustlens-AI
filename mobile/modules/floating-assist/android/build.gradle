plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'ai.trustlens'
version = '1.0.0'

android {
  namespace "ai.trustlens.floatingassist"
  defaultConfig {
    versionCode 1
    versionName "1.0.0"
  }
  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }
  kotlinOptions {
    jvmTarget = "17"
  }
}

dependencies {
  implementation "androidx.core:core-ktx:1.15.0"
  // On-device OCR so floating analyze grades real screen text, not a meta prompt
  implementation "com.google.mlkit:text-recognition:16.0.1"
}
